<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">

            <div id="imagem">
                
            </div>

            <div id="formulario">

                <h1>Login</h1>

                <p>Seja Bem-Vindo(a) novamente, Professor. Faça login para acessar sua área de trabalho e poder fazer as configurações na sua turma</p>

                <form action="area.html" method="post" autocomplete="on">

                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" name="nome" id="inome" placeholder="Seu Nome" required>
                        <label for="inome">Nome</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="isenha" placeholder="Sua Senha" autocomplete="current-password" required maxlength="20">
                        <label for="isenha">Senha</label>
                    </div>

                    <a href="area.html"><input type="submit" value="Entrar" onclick="entrar()"></a>

                    <a href="#" class="botao" onclick="esqueci()">
                        Esqueci a senha <span class="material-symbols-outlined">mail</span>
                    </a>

                </form>

            </div>

        </section>
    </main>

    <script src="script/script.js"></script>
</body>
</html>
